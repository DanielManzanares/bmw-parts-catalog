let currentLang = localStorage.getItem('language') || 'en';

function translateText(text, lang) {
    if (lang === 'en' || !text) return text;
    let translated = text;
    const sorted = Object.entries(wordReplacements).sort((a,b) => b[0].length - a[0].length);
    for (const [en, es] of sorted) {
        const regex = new RegExp('\\b' + en + '\\b', 'gi');
        translated = translated.replace(regex, es);
    }
    return translated;
}

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('language', lang);
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('lang-' + lang).classList.add('active');
    document.querySelectorAll('.lang-text').forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text) el.textContent = text;
    });
    document.querySelectorAll('[data-original]').forEach(el => {
        const orig = el.getAttribute('data-original');
        if (orig) el.textContent = translateText(orig, lang);
    });
}

// Simple router
const router = {
    navigate(path) {
        window.history.pushState({}, '', `#${path}`);
        this.render();
    },
    render() {
        const hash = window.location.hash.slice(1) || '';
        const parts = hash.split('/');
        
        if (!hash) renderHome();
        else if (parts[0] === 'model' && parts[1]) renderModel(parts[1]);
        else if (parts[0] === 'model' && parts[1] && parts[2] === 'category' && parts[3]) renderCategory(parts[1], parts[3]);
        else if (parts[0] === 'diagram' && parts[1]) renderDiagram(parts[1]);
        else renderHome();
        
        setTimeout(() => setLanguage(currentLang), 100);
    }
};

window.addEventListener('hashchange', () => router.render());
window.addEventListener('load', () => router.render());

            <div class="stats-grid" style="margin-bottom: 32px;">
                <div class="stat-card">
                    <div class="stat-value">${categories.length}</div>
                    <div class="stat-label lang-text" data-en="Categories" data-es="Categorías">Categories</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${categories.reduce((sum, c) => sum + c.diagram_count, 0)}</div>
                    <div class="stat-label lang-text" data-en="Diagrams" data-es="Diagramas">Diagrams</div>
                </div>
            </div>
            <div style="margin-bottom: 24px;">
                <h2 class="lang-text" style="font-size: 18px; font-weight: 600; margin-bottom: 16px;" data-en="Categories" data-es="Categorías">Categories</h2>
            </div>
            <div class="grid">
                ${categories.map(c => `
                    <div class="card" onclick="router.navigate('model/${modelId}/category/${c.id}')">
                        ${c.representative_image ? `<img src="${c.representative_image}" alt="${c.name}" style="width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; background: #fafafa;">` : `<div style="width: 100%; height: 140px; background: #fafafa; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; color: #d4d4d4; font-size: 48px;">📋</div>`}
                        <div class="card-title" style="font-size: 15px; margin-bottom: 8px;" data-original="${c.name}">${c.name}</div>
                        <div class="card-meta">
                            <span>${c.diagram_count} <span class="lang-text" data-en="diagrams" data-es="diagramas">diagrams</span></span>
                        </div>
                    </div>
                `).join('')}
            </div>
            <div style="margin-top: 48px;">
                <button class="btn-secondary" onclick="router.navigate('')">
                    <span>←</span>
                    <span class="lang-text" data-en="Back to Models" data-es="Volver a Modelos">Back to Models</span>
                </button>
            </div>
        </div>
    `;
}

async function renderCategory(modelId, categoryId) {
    const models = await fetch('data/models.json').then(r => r.json());
    const model = models.find(m => m.id == modelId);
    const categories = await fetch(`data/model_${modelId}_categories.json`).then(r => r.json());
    const category = categories.find(c => c.id == categoryId);
    const diagrams = await fetch(`data/model_${modelId}_category_${categoryId}_diagrams.json`).then(r => r.json());

    document.getElementById('app').innerHTML = `
        <div class="breadcrumb">
            <div class="breadcrumb-content">
                <a onclick="router.navigate('')" class="lang-text" data-en="Home" data-es="Inicio">Home</a>
                <span class="breadcrumb-sep">/</span>
                <a onclick="router.navigate('model/${modelId}')">${model.series_code} ${model.model_code}</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current" data-original="${category.name}">${category.name}</span>
            </div>
        </div>
        <div class="container">
            <div class="page-header">
                <h1 class="page-title" data-original="${category.name}">${category.name}</h1>
                <p class="page-subtitle">${model.series_code} ${model.model_code} · ${diagrams.length} <span class="lang-text" data-en="diagrams" data-es="diagramas">diagrams</span></p>
            </div>
            <div class="grid">
                ${diagrams.map(d => `
                    <div class="card" onclick="router.navigate('diagram/${d.id}')">
                        ${d.image_url ? `<img src="${d.image_url}" alt="${d.diagram_title}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; background: #fafafa;">` : `<div style="width: 100%; height: 180px; background: #fafafa; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; color: #d4d4d4; font-size: 48px;">📋</div>`}
                        <div class="card-title" style="font-size: 15px; margin-bottom: 8px;" data-original="${d.diagram_title}">${d.diagram_title}</div>
                        <div class="card-meta">
                            <span>${d.parts_count} <span class="lang-text" data-en="parts" data-es="piezas">parts</span></span>
                        </div>
                    </div>
                `).join('')}
            </div>
            <div style="margin-top: 48px;">
                <button class="btn-secondary" onclick="router.navigate('model/${modelId}')">
                    <span>←</span>
                    <span class="lang-text" data-en="Back to Model" data-es="Volver al Modelo">Back to Model</span>
                </button>
            </div>
        </div>
    `;
}

async function renderDiagram(diagramId) {

    document.getElementById('app').innerHTML = `

                <a onclick="router.navigate('model/${diagram.model_id}')">${diagram.series_code} ${diagram.model_code}</a>
                <span class="breadcrumb-sep">/</span>
                <a onclick="router.navigate('model/${diagram.model_id}/category/${diagram.category_id}')" data-original="${diagram.category_name}">${diagram.category_name}</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current" data-original="${diagram.diagram_title}">${diagram.diagram_title}</span>
            </div>
        </div>
        <div class="container">
            <div class="page-header">
                <h1 class="page-title" data-original="${diagram.diagram_title}">${diagram.diagram_title}</h1>
                <p class="page-subtitle">${diagram.series_code} ${diagram.model_code} ${diagram.engine_code || ''} · ${diagram.parts.length} <span class="lang-text" data-en="parts" data-es="piezas">parts</span></p>

            ${diagram.image_url ? `<div style="background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; margin-bottom: 32px;"><img src="${diagram.image_url}" alt="${diagram.diagram_title}" class="diagram-img"></div>` : ''}
            ${diagram.parts.length > 0 ? `
            <div style="background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; margin-bottom: 32px;">
                <h2 class="lang-text" style="font-size: 18px; font-weight: 600; margin-bottom: 20px;" data-en="Parts List" data-es="Lista de Piezas">Parts List</h2>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 60px;">Pos</th>

                            <th class="lang-text" data-en="Description" data-es="Descripción">Description</th>
                            <th class="lang-text" style="width: 200px;" data-en="Compatible" data-es="Compatible">Compatible</th>
                            <th class="lang-text" style="width: 100px; text-align: right;" data-en="Price" data-es="Precio">Price</th>
                            <th class="lang-text" style="width: 120px; text-align: center;" data-en="Search" data-es="Buscar">Search</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${diagram.parts.map(p => `
                            <tr>

                                <td><span class="part-number">${p.part_number.replace(/ /g, '')}</span></td>
                                <td><span data-original="${p.description}">${p.description}</span></td>
                                <td>
                                    ${p.compatible_models ? `
                                        <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                                            ${p.compatible_models.split(', ').filter(s => ['E28','E36','E46'].includes(s.trim())).map(s => `<span style="background: #1a1a1a; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;">${s.trim()}</span>`).join('')}
                                            <span class="lang-text" style="color: #999; font-size: 12px; padding: 2px 4px;" data-en="+${p.compatible_models.split(', ').length} models" data-es="+${p.compatible_models.split(', ').length} modelos">+${p.compatible_models.split(', ').length} models</span>
                                        </div>
                                    ` : '<span style="color: #d4d4d4; font-size: 12px;">-</span>'}
                                </td>
                                <td style="text-align: right;">

                                </td>
                                <td style="text-align: center;">
                                    <a href="https://www.autodoc.es/search?keyword=${p.part_number.replace(/ /g, '')}" target="_blank" class="lang-text" style="padding: 6px 16px; font-size: 12px; font-weight: 600; display: inline-block; background: #FF6C00; color: white; border-radius: 6px; text-decoration: none; transition: all 0.2s;" onmouseover="this.style.background='#E65C00'" onmouseout="this.style.background='#FF6C00'" data-en="Search" data-es="Buscar">Search</a>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            ` : ''}
            <div style="margin-top: 32px;">
                <button class="btn-secondary" onclick="router.navigate('model/${diagram.model_id}/category/${diagram.category_id}')">
                    <span>←</span>
                    <span class="lang-text" data-en="Back to" data-es="Volver a">Back to</span>
                    <span data-original="${diagram.category_name}">${diagram.category_name}</span>
                </button>
            </div>
        </div>
    `;
}
    </script>
</body>
